<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>流浪者与三个路人 - NPC Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div id="intro-overlay">
    <div class="intro-lines">
      <p class="intro-line">你好像掉进了一个不知名的地方。</p>
      <p class="intro-line">不记得自己从哪里来，也不知道要去哪里。</p>
      <p class="intro-line">前面有几个人。</p>
      <p class="intro-line intro-line--cta">要不要过去说说话？</p>
      <p class="intro-hint">点击任意处继续</p>
    </div>
  </div>

  <div class="app-container">

    <header class="app-header">
      <div class="header-left">
        <h1>流浪者与三个路人</h1>
        <p class="subtitle">环境和连结能否改变一个人在危机时刻的选择？</p>
      </div>
      <div class="header-config">
        <div class="config-row">
          <label for="api-key-input">API Key</label>
          <input id="api-key-input" type="password" placeholder="粘贴 Gemini API Key（仅保存在内存）" />
        </div>
        <div class="config-row">
          <label for="model-name-input">模型</label>
          <input id="model-name-input" type="text" value="gemini-2.0-flash"
            placeholder="如 gemini-2.0-flash / gemini-2.5-pro-preview" />
          <span class="config-hint">支持思考的模型将在侧边栏显示思考过程</span>
        </div>
      </div>
    </header>

    <div class="app-body">

      <main class="app-main">

        <section class="scene-panel">
          <div class="street">
            <div class="lane lane-top"></div>
            <div class="lane lane-bottom"></div>
          </div>
          <div class="characters-layer">
            <div class="character player" id="player-circle" title="你">
              <span class="char-label">你</span>
            </div>
            <div class="character npc" id="npc-1" data-character-id="char1" title="她·蓝灰">
              <span class="char-label">她</span>
            </div>
            <div class="character npc" id="npc-2" data-character-id="char2" title="他·锈橙">
              <span class="char-label">他</span>
            </div>
            <div class="character npc" id="npc-3" data-character-id="char3" title="她·暗紫">
              <span class="char-label">她</span>
            </div>
          </div>
        </section>

        <section class="dialogue-panel">
          <div class="character-select">
            <span class="select-label">对话对象：</span>
            <button class="character-button" data-character-id="char1">她·蓝灰</button>
            <button class="character-button" data-character-id="char2">他·锈橙</button>
            <button class="character-button" data-character-id="char3">她·暗紫</button>
          </div>

          <div class="dialogue-history" id="dialogue-history">
            <p class="dialogue-empty">选择角色，开始对话。</p>
          </div>

          <div class="dialogue-input-area">
            <textarea id="player-input" placeholder="你想对他说什么？（Ctrl + Enter 发送）" rows="3"></textarea>
            <div class="dialogue-actions">
              <span id="closing-hint" class="closing-hint"></span>
              <button id="send-button">说出这句</button>
            </div>
          </div>

          <div class="timeline-actions">
            <button id="ending-button">继续走 / 时间流逝 →</button>
          </div>
        </section>

      </main>

      <aside class="ai-sidebar" id="ai-sidebar">
        <div class="ai-sidebar-header">
          <h2>AI 原始输出</h2>
          <div class="sidebar-btn-row">
            <button id="test-gemini-btn" class="sidebar-btn">测试连接</button>
            <button id="clear-output-btn" class="sidebar-btn">清空</button>
          </div>
        </div>
        <div class="ai-output-list" id="ai-output-list">
          <p class="ai-output-empty">对话开始后，AI 的思考过程与原始输出将在此显示。</p>
        </div>
      </aside>

    </div>

  </div>

  <!-- config.local.js 在 .gitignore 里，不会上传 GitHub；
       不存在时页面不报错，降级到输入框手动填写 -->
  <script src="config.local.js" onerror="void 0"></script>
  <script src="characters.js"></script>
  <script src="dialogue.js"></script>
  <script src="ending.js"></script>
  <script src="loop.js"></script>

  <script>
    (function () {
      var overlay = document.getElementById('intro-overlay');
      var lines   = overlay.querySelectorAll('.intro-line');
      var hint    = overlay.querySelector('.intro-hint');

      var TOTAL       = lines.length; // 4
      var COOLDOWN    = 3000;         // 3s 冷却
      var FINAL_WAIT  = 10000;        // 最后一行后等待 10s

      var shown       = -1;     // 当前已显示到第几行（-1 = 尚未显示任何行）
      var cooldownEnd = 0;      // 冷却结束时间戳
      var inFinalWait = false;  // 是否进入最终等待阶段
      var exiting     = false;  // 是否已开始退场

      /* ── 更新提示文字 ── */
      function setHint(text, isFinal) {
        hint.textContent = text;
        hint.classList.add('io-visible');
        if (isFinal) {
          hint.classList.add('io-final');
        } else {
          hint.classList.remove('io-final');
        }
      }

      /* ── 倒计时驱动器 ── */
      function runCountdown(durationMs, onTick, onDone) {
        var end = Date.now() + durationMs;
        (function tick() {
          if (exiting) return;
          var remaining = end - Date.now();
          if (remaining <= 0) { onDone(); return; }
          onTick(Math.ceil(remaining / 1000));
          setTimeout(tick, 250);
        })();
      }

      /* ── 退场（淡出并移除节点） ── */
      function dismiss() {
        if (exiting) return;
        exiting = true;
        hint.classList.remove('io-visible');
        setTimeout(function () {
          overlay.classList.add('io-fading');
          overlay.addEventListener('transitionend', function onEnd(e) {
            if (e.target !== overlay) return;
            overlay.removeEventListener('transitionend', onEnd);
            if (overlay.parentNode) overlay.parentNode.removeChild(overlay);
          });
        }, 300);
      }

      /* ── 显示下一行并启动冷却 / 最终等待 ── */
      function advance() {
        shown++;
        lines[shown].classList.add('io-visible');

        if (shown === TOTAL - 1) {
          // 最后一行 → 15s 后自动进入主界面
          inFinalWait = true;
          runCountdown(
            FINAL_WAIT,
            function (s) { setHint('片刻后，你迈出了脚步……  ' + s + 's', true); },
            dismiss
          );
        } else {
          // 普通行 → 10s 冷却
          cooldownEnd = Date.now() + COOLDOWN;
          runCountdown(
            COOLDOWN,
            function (s) { setHint(s + 's 后可继续', false); },
            function () {
              cooldownEnd = 0;
              setHint('点击继续', false);
            }
          );
        }
      }

      /* ── 交互入口（点击 / 键盘） ── */
      function handleInteraction() {
        if (exiting || inFinalWait) return;
        if (Date.now() < cooldownEnd) return; // 冷却中，忽略
        advance();
      }

      overlay.addEventListener('click', handleInteraction);
      document.addEventListener('keydown', function (e) {
        if (e.metaKey || e.ctrlKey || e.altKey) return;
        handleInteraction();
      });

      // 初始提示（稍作延迟，避免页面加载闪烁）
      setTimeout(function () { setHint('点击继续', false); }, 700);
    })();
  </script>
</body>
</html>
